<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>乘法口诀练习</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <h1>乘法口诀练习</h1>
      </div>
      <div class="summary" id="summary" aria-live="polite">共 0 题</div>
    </header>

    <main class="game-layout">
      <section class="practice-panel" aria-label="练习区">
        <section class="card formula-card" aria-label="当前题目">
          <div class="formula-display" id="formulaDisplay" aria-live="polite">
            <span id="factorA">1</span><span class="operator">×</span><span id="factorB">1</span><span class="operator">=</span><span id="answerDisplay" class="answer-display" role="textbox" aria-label="答案显示" aria-readonly="true"></span>
          </div>
        </section>

        <section class="card keypad-panel" aria-label="数字键盘">
          <div id="keypad" class="keypad">
            <button type="button" data-digit="7" aria-label="数字 7">7</button>
            <button type="button" data-digit="8" aria-label="数字 8">8</button>
            <button type="button" data-digit="9" aria-label="数字 9">9</button>
            <button type="button" data-digit="4" aria-label="数字 4">4</button>
            <button type="button" data-digit="5" aria-label="数字 5">5</button>
            <button type="button" data-digit="6" aria-label="数字 6">6</button>
            <button type="button" data-digit="1" aria-label="数字 1">1</button>
            <button type="button" data-digit="2" aria-label="数字 2">2</button>
            <button type="button" data-digit="3" aria-label="数字 3">3</button>
            <button type="button" data-digit="0" class="zero-key" aria-label="数字 0">0</button>
          </div>
        </section>

        <section class="card settings-panel" aria-label="出题范围设置">
          <div class="section-heading settings-heading">
            <div>
              <h2>出题范围</h2>
              <span id="rangeLabel" class="range-label">A 1-9，B 1-9</span>
            </div>
            <button type="button" id="toggleSettings" class="collapse-button" aria-expanded="true" aria-controls="settingsDetails">收起</button>
          </div>

          <div id="settingsDetails" class="collapsible-content">
            <div class="settings-grid">
              <fieldset>
                <legend>A 的范围</legend>
                <label>
                  从
                  <input id="rangeAMin" type="number" inputmode="numeric" min="1" max="9" value="1" aria-label="A 最小值">
                </label>
                <label>
                  到
                  <input id="rangeAMax" type="number" inputmode="numeric" min="1" max="9" value="9" aria-label="A 最大值">
                </label>
              </fieldset>

              <fieldset>
                <legend>B 的范围</legend>
                <label>
                  从
                  <input id="rangeBMin" type="number" inputmode="numeric" min="1" max="9" value="1" aria-label="B 最小值">
                </label>
                <label>
                  到
                  <input id="rangeBMax" type="number" inputmode="numeric" min="1" max="9" value="9" aria-label="B 最大值">
                </label>
              </fieldset>
            </div>

            <div class="settings-actions">
              <button type="button" id="applySettings" class="secondary-button">应用范围</button>
              <button type="button" id="resetData" class="ghost-button">清空记录</button>
            </div>
            <p id="statusMessage" class="status-message" aria-live="polite"></p>
          </div>
        </section>
      </section>

      <aside class="stats-panel" aria-label="记录与正确率">
        <section class="card table-panel">
          <div class="section-heading">
            <h2>乘法表正确率</h2>
            <button type="button" id="toggleTable" class="collapse-button" aria-expanded="true" aria-controls="tableDetails">收起</button>
          </div>
          <div id="tableDetails" class="collapsible-content">
            <div class="accuracy-legend" aria-label="正确率颜色图例">
              <span><i class="acc-empty"></i>未做</span>
              <span><i class="acc-0"></i>0%</span>
              <span><i class="acc-20"></i>20%</span>
              <span><i class="acc-40"></i>40%</span>
              <span><i class="acc-60"></i>60%</span>
              <span><i class="acc-80"></i>80%</span>
              <span><i class="acc-100"></i>100%</span>
            </div>
            <div id="miniTable" class="mini-table" aria-label="乘法口诀正确率表"></div>
          </div>
        </section>

        <section class="card history-panel">
          <div class="section-heading">
            <h2>历史记录</h2>
            <button type="button" id="toggleHistory" class="collapse-button" aria-expanded="true" aria-controls="historyDetails">收起</button>
          </div>
          <div id="historyDetails" class="collapsible-content">
            <p class="small-note">最新在上</p>
            <ol id="historyList" class="history-list" aria-live="polite"></ol>
          </div>
        </section>
      </aside>
    </main>
  </div>
</body>
</html>
